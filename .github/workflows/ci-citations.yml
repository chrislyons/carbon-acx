---
name: CI (Citations)

'on':
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  citations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.11'

      - uses: abatilo/actions-poetry@fd0e6716a0de25ef6ade151b8b53190b0376acfd  # v3
        with:
          poetry-version: '1.8.3'

      - name: Install dependencies
        run: poetry install --no-interaction --with dev --extras "db"

      - name: Run make validate
        run: make validate

      - name: Run pytest
        run: poetry run pytest -q

      - name: Scan claims for citations
        run: poetry run python tools/citations/scan_claims.py

      - name: Build artifact references
        run: poetry run python tools/citations/references_builder.py --all

      - name: Verify harvested references
        run: poetry run python tools/citations/harvest.py --check
