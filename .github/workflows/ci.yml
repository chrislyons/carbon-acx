---
name: CI

'on':
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: write

jobs:
  lint-yaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: ibiqlik/action-yamllint@2576378a8e339169678f9939646ee3ee325e845c  # v3
        with:
          file_or_dir: .github/workflows
          config_file: .yamllint.yml

  build-static:
    runs-on: ubuntu-latest
    needs: [lint-yaml]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Determine required Node version
        id: node_engine
        run: |
          node_version=$(python3 - <<'PY'
import json
with open('package.json') as f:
    pj = json.load(f)
node = pj.get('engines', {}).get('node', '20.19.4')
print(node)
PY
)
          echo "node_version=$node_version" >> $GITHUB_OUTPUT

      - name: Setup Node (use package.json engines)
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: ${{ steps.node_engine.outputs.node_version }}

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4
        with:
          version: 10.5.2
          run_install: false
      - name: Verify pinned toolchain
        run: ./scripts/bootstrap.sh --check-only

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile -w

      - name: Install web workspace dependencies
        run: pnpm --filter carbon-acx-web install --frozen-lockfile


      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: abatilo/actions-poetry@fd0e6716a0de25ef6ade151b8b53190b0376acfd  # v3
        with:
          poetry-version: "1.8.3"

      - name: Install validator dependencies
        run: pip install -r tools/validator/requirements.txt

      - name: Install deps
        run: poetry install --no-interaction --no-root --extras "db"

      - name: Build artifacts (CSV backend)
        env:
          ACX_GENERATED_AT: "1970-01-01T00:00:00+00:00"
          ACX_DATA_BACKEND: "csv"
          ACX_OUTPUT_ROOT: "dist/artifacts"
          ACX040_HASHED: "1"
          PYTHONPATH: "."
        run: |
          make build
          make verify_manifests
          make validate-manifests
          make validate-diff-fixtures
          make build-static

      - name: Upload data artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: dist-artifacts
          path: dist/artifacts

      - name: Upload static site bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: dist-site
          path: dist/site

  tests:
    runs-on: ubuntu-latest
    needs: [build-static]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Guard — fail if binaries slipped into PR
        run: |
          set -euo pipefail
          for forbidden in refs/raw refs/normalized; do
            if git ls-files --error-unmatch "${forbidden}/*" \
              >/dev/null 2>&1;
            then
              echo "::error::Binary/normalized files under refs/* must not be" \
                "committed."
              exit 1
            fi
          done
          LARGE=$( \
            git ls-files refs | while read -r path; do
              if [ -f "$path" ] && [ "$(wc -c < "$path")" -gt 65536 ]; then
                echo "$path"
              fi
            done | tr -s '\n' ' '
          )
          if [ -n "$LARGE" ]; then
            echo "::error::Large files detected under refs/: $LARGE"
            exit 1
          fi
      - name: Determine required Node version
        id: node_engine
        run: |
          node_version=$(python3 - <<'PY'
import json
with open('package.json') as f:
    pj = json.load(f)
node = pj.get('engines', {}).get('node', '20.19.4')
print(node)
PY
)
          echo "node_version=$node_version" >> $GITHUB_OUTPUT

      - name: Setup Node (use package.json engines)
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: ${{ steps.node_engine.outputs.node_version }}
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4
        with:
          version: 10.5.2
          run_install: false
      - name: Verify pinned toolchain
        run: ./scripts/bootstrap.sh --check-only
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile -w
      - name: Install web workspace dependencies
        run: pnpm --filter carbon-acx-web install --frozen-lockfile
      - name: Run web unit tests
        working-directory: apps/carbon-acx-web
        run: pnpm test
      - name: Run web typecheck
        working-directory: apps/carbon-acx-web
        run: pnpm typecheck
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"
      - uses: abatilo/actions-poetry@fd0e6716a0de25ef6ade151b8b53190b0376acfd  # v3
        with:
          poetry-version: "1.8.3"
      - run: poetry install --no-interaction --extras "db"
      - name: Run pytest
        run: poetry run pytest -q
